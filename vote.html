<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ミス水戸一2026 投票</title>
<style>
:root{
  --bg:#101113;
  --panel:#1a1d21;
  --panel2:#22262b;
  --text:#f7f2ea;
  --muted:#b9b1a5;
  --line:rgba(255,255,255,.15);
  --gold:#d8c48b;
  --red:#b2293d;
  --red2:#d84b5c;
  --ok:#72d69b;
  --danger:#e36b7a;
  --shadow:0 18px 45px rgba(0,0,0,.35);
  --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",system-ui,sans-serif;
  --serif:"Hiragino Mincho ProN","Yu Mincho",serif;
}

*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  background:
    radial-gradient(circle at 50% -10%,rgba(216,196,139,.16),transparent 32%),
    radial-gradient(circle at 0% 100%,rgba(178,41,61,.18),transparent 36%),
    linear-gradient(145deg,#24272b,#111315 55%,#070809);
  color:var(--text);
  font-family:var(--sans);
  -webkit-tap-highlight-color:transparent;
}
button,input{font:inherit}
button{color:inherit}

.app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:18px clamp(14px,3vw,34px) 70px;
  gap:14px;
}

.header{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:12px;
}

.brand{
  text-align:center;
  font-family:var(--serif);
  letter-spacing:.08em;
}

.brand .sub{
  color:var(--gold);
  font-size:13px;
  font-style:italic;
}

.brand .title{
  font-size:clamp(30px,5vw,50px);
  line-height:1.15;
}

.topStat{
  justify-self:end;
  border:1px solid var(--line);
  background:rgba(255,255,255,.07);
  border-radius:999px;
  padding:10px 14px;
  color:var(--muted);
  font-size:13px;
  white-space:nowrap;
}

.status{
  justify-self:start;
  display:inline-flex;
  align-items:center;
  gap:8px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.07);
  border-radius:999px;
  padding:10px 14px;
  color:var(--muted);
  font-size:13px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--ok);
  box-shadow:0 0 12px var(--ok);
}

.notice{
  text-align:center;
  color:#ffd0d6;
  min-height:24px;
  font-weight:700;
}

.grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
  align-content:start;
}

.card{
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));
  border-radius:18px;
  min-height:210px;
  padding:0;
  cursor:pointer;
  overflow:hidden;
  text-align:left;
  box-shadow:var(--shadow);
  transition:transform .12s ease,border-color .12s ease,background .12s ease;
}

.card:active{
  transform:scale(.985);
  border-color:rgba(216,196,139,.55);
}

.cardHead{
  padding:18px 17px 14px;
  min-height:126px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:
    linear-gradient(135deg,rgba(216,196,139,.10),transparent 45%),
    linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.05));
}

.num{
  font-family:var(--serif);
  color:var(--gold);
  font-size:15px;
  font-style:italic;
}

.name{
  margin-top:10px;
  font-family:var(--serif);
  font-size:clamp(28px,3vw,40px);
  letter-spacing:.08em;
  line-height:1.15;
  word-break:keep-all;
  overflow-wrap:anywhere;
}

.voteCount{
  border-top:1px solid rgba(255,255,255,.11);
  padding:16px 17px;
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:10px;
}

.voteCount .label{
  color:var(--muted);
  font-size:13px;
}

.voteCount .count{
  color:var(--gold);
  font-size:26px;
  font-family:var(--serif);
}

.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.controlBtn{
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.07);
  color:var(--text);
  padding:11px 16px;
  cursor:pointer;
}

.controlBtn.primary{
  background:linear-gradient(135deg,#8c2030,#c34658);
  border-color:rgba(255,255,255,.18);
}

.controlBtn.danger{
  color:#ffd0d6;
  border-color:rgba(227,107,122,.45);
}

.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(0,0,0,.66);
  backdrop-filter:blur(12px);
  z-index:10;
}

.modal.show{display:flex}

.dialog{
  width:min(520px,100%);
  border:1px solid var(--line);
  border-radius:20px;
  background:linear-gradient(180deg,#1b1f23,#121416);
  box-shadow:0 30px 90px rgba(0,0,0,.55);
  padding:24px;
  text-align:center;
}

.dialog .small{
  color:var(--gold);
  font-family:var(--serif);
  font-style:italic;
}

.dialog .big{
  margin:8px 0 10px;
  font-family:var(--serif);
  font-size:42px;
  letter-spacing:.08em;
}

.dialog p{
  color:var(--muted);
  line-height:1.7;
  margin:0 0 20px;
}

.actions{
  display:flex;
  gap:10px;
}

.actions button{
  border:1px solid var(--line);
  border-radius:999px;
  padding:15px 16px;
  background:rgba(255,255,255,.08);
  cursor:pointer;
}

.actions .submit{
  flex:2;
  background:linear-gradient(135deg,#8c2030,#c34658);
}

.actions .back{
  flex:1;
}

.resultPanel{
  display:none;
  border:1px solid var(--line);
  border-radius:18px;
  background:rgba(255,255,255,.07);
  box-shadow:var(--shadow);
  overflow:hidden;
}

.resultPanel.show{display:block}

.resultHeader{
  padding:15px 18px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.11);
}

.resultHeader h2{
  font-family:var(--serif);
  font-size:24px;
  font-weight:400;
  margin:0;
}

.resultList{
  margin:0;
  padding:0;
  list-style:none;
}

.resultList li{
  display:grid;
  grid-template-columns:60px 1fr auto;
  gap:12px;
  align-items:center;
  padding:13px 18px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.resultList li:last-child{border-bottom:none}

.rank{
  color:var(--gold);
  font-family:var(--serif);
}

.resultName{
  font-size:17px;
}

.resultVotes{
  font-family:var(--serif);
  color:var(--gold);
  font-size:22px;
}

.footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:8px 12px;
  text-align:center;
  color:rgba(255,255,255,.52);
  background:rgba(0,0,0,.58);
  backdrop-filter:blur(10px);
  font-size:12px;
  z-index:5;
}

@media(max-width:900px){
  .header{grid-template-columns:1fr}
  .status,.topStat{justify-self:center}
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}

@media(max-width:520px){
  .app{padding:12px 10px 64px}
  .grid{gap:10px}
  .card{min-height:180px;border-radius:15px}
  .cardHead{padding:15px 13px 12px;min-height:110px}
  .name{font-size:27px}
  .voteCount{padding:13px}
  .voteCount .count{font-size:23px}
  .actions{flex-direction:column-reverse}
  .resultList li{grid-template-columns:48px 1fr auto;padding:12px 13px}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="status"><span class="dot"></span><span>投票受付中</span></div>
    <div class="brand">
      <div class="sub">MISS MITOICHI 2026</div>
      <div class="title">投票フォーム</div>
    </div>
    <div class="topStat" id="totalVotes">この端末：0票</div>
  </header>

  <div class="notice" id="notice"></div>

  <main class="grid" id="candidateGrid"></main>

  <section class="resultPanel" id="resultPanel">
    <div class="resultHeader">
      <h2>この端末の集計</h2>
      <button class="controlBtn" type="button" onclick="toggleResults(false)">閉じる</button>
    </div>
    <ol class="resultList" id="resultList"></ol>
  </section>

  <div class="controls">
    <button class="controlBtn primary" type="button" onclick="toggleResults(true)">集計表示</button>
    <button class="controlBtn danger" type="button" onclick="resetVotes()">この端末の票をリセット</button>
  </div>
</div>

<div class="modal" id="confirmModal" role="dialog" aria-modal="true">
  <div class="dialog">
    <div class="small" id="modalNumber"></div>
    <div class="big" id="modalName"></div>
    <p>この候補者に投票します。よろしいですか？</p>
    <div class="actions">
      <button class="back" type="button" onclick="closeModal()">戻る</button>
      <button class="submit" type="button" onclick="submitVote()">投票する</button>
    </div>
  </div>
</div>

<div class="modal" id="thanksModal" role="dialog" aria-modal="true">
  <div class="dialog">
    <div class="small">投票完了</div>
    <div class="big">✓</div>
    <p id="thanksText">投票しました。</p>
    <div class="actions">
      <button class="submit" type="button" onclick="closeThanks()">次の投票へ</button>
    </div>
  </div>
</div>

<div class="footer" id="footerText">データはこのiPad内にのみ保存されます</div>

<script>
(function(){
  "use strict";

  const CANDIDATES = [
    { id:"akane", number:1, name:"あかね" },
    { id:"hamamero", number:2, name:"はまめろ" },
    { id:"reina", number:3, name:"れいな" },
    { id:"sorara", number:4, name:"そらら" },
    { id:"yusepi", number:5, name:"ゆせぴ" },
    { id:"ruta", number:6, name:"るた" },
    { id:"hina", number:7, name:"ひな" }
  ];

  const STORAGE_KEY = "m26_miss_mitoichi_2026_local_votes_standalone_v1";
  let selectedCandidateId = null;

  function $(id){
    return document.getElementById(id);
  }

  function esc(text){
    return String(text).replace(/[&<>"']/g,function(ch){
      return {
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[ch];
    });
  }

  function emptyCounts(){
    const counts = {};
    CANDIDATES.forEach(function(c){
      counts[c.id] = 0;
    });
    return counts;
  }

  function loadCounts(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : {};
      const counts = emptyCounts();
      CANDIDATES.forEach(function(c){
        const value = Number(parsed[c.id]);
        counts[c.id] = Number.isFinite(value) && value > 0 ? Math.floor(value) : 0;
      });
      return counts;
    }catch(e){
      return emptyCounts();
    }
  }

  function saveCounts(counts){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
  }

  function total(counts){
    return Object.values(counts).reduce(function(sum,n){
      return sum + Number(n || 0);
    },0);
  }

  function showNotice(text){
    $("notice").textContent = text || "";
    if(text){
      setTimeout(function(){
        if($("notice").textContent === text) $("notice").textContent = "";
      },2600);
    }
  }

  function render(){
    const counts = loadCounts();

    $("totalVotes").textContent = "この端末：" + total(counts) + "票";
    $("footerText").textContent = "データはこのiPad内にのみ保存されます / 最終更新 " + new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});

    $("candidateGrid").innerHTML = CANDIDATES.map(function(candidate){
      const count = counts[candidate.id] || 0;
      return '' +
        '<button class="card" type="button" data-id="' + esc(candidate.id) + '">' +
          '<div class="cardHead">' +
            '<div class="num">No.' + esc(candidate.number) + '</div>' +
            '<div class="name">' + esc(candidate.name) + '</div>' +
          '</div>' +
          '<div class="voteCount">' +
            '<span class="label">この端末</span>' +
            '<span class="count">' + count + '票</span>' +
          '</div>' +
        '</button>';
    }).join("");

    Array.prototype.forEach.call(document.querySelectorAll(".card"),function(button){
      button.addEventListener("click",function(){
        openModal(button.getAttribute("data-id"));
      });
    });

    renderResults();
  }

  function renderResults(){
    const counts = loadCounts();
    const rows = CANDIDATES.slice().sort(function(a,b){
      const diff = (counts[b.id] || 0) - (counts[a.id] || 0);
      if(diff !== 0) return diff;
      return a.number - b.number;
    });

    $("resultList").innerHTML = rows.map(function(c,index){
      return '' +
        '<li>' +
          '<span class="rank">' + (index + 1) + '位</span>' +
          '<span class="resultName">No.' + esc(c.number) + ' ' + esc(c.name) + '</span>' +
          '<span class="resultVotes">' + (counts[c.id] || 0) + '票</span>' +
        '</li>';
    }).join("");
  }

  function openModal(candidateId){
    const candidate = CANDIDATES.find(function(c){ return c.id === candidateId; });
    if(!candidate){
      showNotice("候補者データを読み込めませんでした。");
      return;
    }

    selectedCandidateId = candidate.id;
    $("modalNumber").textContent = "No." + candidate.number;
    $("modalName").textContent = candidate.name;
    $("confirmModal").classList.add("show");
  }

  window.closeModal = function(){
    selectedCandidateId = null;
    $("confirmModal").classList.remove("show");
  };

  window.submitVote = function(){
    const candidate = CANDIDATES.find(function(c){ return c.id === selectedCandidateId; });
    if(!candidate){
      window.closeModal();
      showNotice("候補者が選択されていません。");
      return;
    }

    const counts = loadCounts();
    counts[candidate.id] = (counts[candidate.id] || 0) + 1;
    saveCounts(counts);

    $("confirmModal").classList.remove("show");
    $("thanksText").textContent = candidate.name + "に投票しました。";
    selectedCandidateId = null;

    render();
    $("thanksModal").classList.add("show");
  };

  window.closeThanks = function(){
    $("thanksModal").classList.remove("show");
  };

  window.toggleResults = function(show){
    $("resultPanel").classList.toggle("show", !!show);
    if(show) renderResults();
    if(show) $("resultPanel").scrollIntoView({behavior:"smooth",block:"nearest"});
  };

  window.resetVotes = function(){
    const ok = confirm("このiPad内の投票データをすべて0票に戻します。よろしいですか？");
    if(!ok) return;
    saveCounts(emptyCounts());
    render();
    showNotice("この端末の票をリセットしました。");
  };

  document.addEventListener("keydown",function(event){
    if(event.key === "Escape"){
      window.closeModal();
      window.closeThanks();
    }
  });

  render();
})();
</script>
</body>
</html>
